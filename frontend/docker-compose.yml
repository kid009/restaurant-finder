services:
  vue:
    build: .
    container_name: vue-app
    ports:
      # Maps port 5173 on your local machine to port 5173 in the container
      - "5173:5173"
    volumes:
      # Mounts your current local directory to /app in the container
      - .:/app
      # Prevents your local node_modules from overriding the container's node_modules
      - /app/node_modules
